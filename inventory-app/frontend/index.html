<!doctype html>
<html lang="en">
  <head>
    <!-- =========================================================================
         DOCUMENT METADATA
         Basic page metadata, title, and stylesheet reference.
         ========================================================================= -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GPS Sales Daily Sales Tracker" />
    <title>GPS Sales - Daily Sales Tracker</title>
    <link rel="stylesheet" href="./styles/style.css" />
  </head>

  <body>
    <!-- =========================================================================
         APPLICATION SHELL
         Main two-column layout containing the navigation panel and form area.
         ========================================================================= -->
    <div class="app-shell">
      <!-- Navigation panel -->
      <aside class="nav-panel" aria-labelledby="nav-panel-title">
        <div class="nav-panel__inner">
          <h2 id="nav-panel-title" class="nav-panel__title">Forms</h2>

          <nav class="nav-menu" aria-label="Primary navigation">
            <button type="button" class="nav-button nav-button--active">
              Sales
            </button>
            <button type="button" class="nav-button">Inventory</button>
            <button type="button" class="nav-button">Sales Report</button>
            <button type="button" class="nav-button">Inventory Report</button>
          </nav>
        </div>
      </aside>
      <!-- End navigation panel -->

      <!-- Main content -->
      <main class="container">
        <form class="sales-form">
          <!-- ===============================================================
               FORM HEADER
               App title and page context.
               =============================================================== -->
          <header class="form-header">
            <h1>GPS MUSCAT</h1>
            <p>Sales Tracker</p>
          </header>

          <!-- ===============================================================
               CUSTOMER DETAILS
               Customer name for the current sales record.
               =============================================================== -->
          <section aria-labelledby="customer-details-heading">
            <h2 id="customer-details-heading" class="sr-only">
              Customer details
            </h2>

            <div class="form-group">
              <label for="customerName">Customer Name</label>
              <input
                type="text"
                id="customerName"
                name="customerName"
                placeholder="Enter customer name"
                required
              />
            </div>
          </section>

          <!-- ===============================================================
               ITEM ENTRY
               Dynamic sales item rows are inserted into the container by JS.
               =============================================================== -->
          <fieldset class="form-group">
            <legend>Items</legend>

            <div id="itemsContainer"></div>

            <button type="button" id="addItemBtn" class="secondary-btn">
              + Add Item
            </button>
          </fieldset>

          <!-- ===============================================================
               PRICING SUMMARY
               Subtotal and total are calculated automatically in JavaScript.
               =============================================================== -->
          <section aria-labelledby="pricing-heading">
            <h2 id="pricing-heading" class="sr-only">Pricing summary</h2>

            <div class="form-row totals-row">
              <div class="form-group">
                <label for="subtotalPrice">Subtotal (OMR)</label>
                <input
                  type="text"
                  id="subtotalPrice"
                  name="subtotalPrice"
                  placeholder="0.000"
                  readonly
                  aria-describedby="subtotalHelp"
                />
                <small id="subtotalHelp" class="form-help">
                  Calculated automatically. Before VAT.
                </small>
              </div>

              <div class="form-group">
                <label for="totalPrice">Total (OMR)</label>
                <input
                  type="text"
                  id="totalPrice"
                  name="totalPrice"
                  placeholder="0.000"
                  readonly
                  aria-describedby="totalHelp"
                />
                <small id="totalHelp" class="form-help">
                  Calculated automatically. With VAT if applicable.
                </small>
              </div>
            </div>
          </section>

          <!-- ===============================================================
               SALE TIMING
               Editable date and time field for the current sale.
               =============================================================== -->
          <section aria-labelledby="sale-details-heading">
            <h2 id="sale-details-heading" class="sr-only">Sale details</h2>

            <div class="form-group">
              <label for="saleDateTime">Date and Time</label>
              <input
                type="datetime-local"
                id="saleDateTime"
                name="saleDateTime"
              />
            </div>
          </section>

          <!-- ===============================================================
               SALE OPTIONS
               VAT and payment status flags for the current sale.
               =============================================================== -->
          <fieldset class="form-group">
            <legend>Sale Options</legend>

            <div class="checkbox-row">
              <label class="checkbox-group" for="vat">
                <input type="checkbox" id="vat" name="vat" />
                <span>VAT 5%</span>
              </label>

              <label class="checkbox-group" for="paid">
                <input type="checkbox" id="paid" name="paid" />
                <span>Paid</span>
              </label>
            </div>
          </fieldset>

          <!-- ===============================================================
               FORM ACTIONS
               Save and reset controls for the sales form.
               =============================================================== -->
          <div class="form-actions">
            <button type="submit" class="primary-btn form-actions__save">
              Save Sales Record
            </button>
            <button type="button" id="clearFormBtn" class="clear-btn">
              Clear
            </button>
          </div>

          <!-- Autocomplete source for item inputs -->
          <datalist id="inventoryItemsList"></datalist>
        </form>
      </main>
      <!-- End main content -->
    </div>
    <!-- End application shell -->

    <!-- JavaScript -->
    <script src="./js/script.js" defer></script>
  </body>
</html>
